<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CALCVLVS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#050508;
  --gold:#c8a84b;
  --gold-l:#e8cb5e;
  --gold-d:#8f7028;
  --gold-glow:rgba(200,168,75,.22);
  --cream:#f5edd8;
  --cream-m:rgba(230,205,148,.45);
  --glass:rgba(11,11,19,.9);
  --border:rgba(185,148,55,.28);
  --btn-num:rgba(20,20,36,.97);
  --btn-sp:rgba(35,34,58,.95);
  --df:'Cormorant Garamond',serif;
  --uf:'Space Grotesk',sans-serif;
  --radius:30px;
  --btn-r:15px;
}

html,body{height:100%;overflow:hidden}

body{
  font-family:var(--uf);
  background:var(--bg);
  color:var(--cream);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100dvh;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

/* ─── Background orbs ─── */
.bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px)}
.o1{width:700px;height:700px;background:radial-gradient(circle,#190838 0%,transparent 68%);top:-25%;left:-20%;opacity:.5;animation:d1 20s ease-in-out infinite alternate}
.o2{width:550px;height:550px;background:radial-gradient(circle,#08183a 0%,transparent 68%);bottom:-18%;right:-12%;opacity:.48;animation:d2 25s ease-in-out infinite alternate}
.o3{width:420px;height:420px;background:radial-gradient(circle,#3a1800 0%,transparent 68%);top:28%;right:18%;opacity:.3;animation:d3 17s ease-in-out infinite alternate}
.o4{width:300px;height:300px;background:radial-gradient(circle,#0a200a 0%,transparent 68%);bottom:15%;left:10%;opacity:.25;animation:d4 22s ease-in-out infinite alternate}

@keyframes d1{to{transform:translate(7%,5%) scale(1.12)}}
@keyframes d2{to{transform:translate(-5%,-7%) scale(1.18)}}
@keyframes d3{to{transform:translate(3%,-6%) scale(.88)}}
@keyframes d4{to{transform:translate(5%,4%) scale(1.1)}}

/* ─── Particle canvas ─── */
#particles{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ─── Noise ─── */
.noise{position:fixed;inset:0;pointer-events:none;z-index:998;opacity:.028}

/* ─── Vignette ─── */
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.55) 100%)}

/* ─── Entry ─── */
.wrap{position:relative;z-index:10;padding:16px;animation:rise .85s cubic-bezier(.16,1,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(44px) scale(.94)}to{opacity:1;transform:none}}

/* ─── Calculator card ─── */
.calc{
  width:clamp(300px,88vw,380px);
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px 22px 26px;
  backdrop-filter:blur(24px) saturate(1.3);
  -webkit-backdrop-filter:blur(24px) saturate(1.3);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.045) inset,
    0 -1px 0 rgba(0,0,0,.6) inset,
    0 48px 96px rgba(0,0,0,.75),
    0 0 0 1px rgba(0,0,0,.6),
    0 0 70px var(--gold-glow);
  position:relative;overflow:hidden;
  transform-style:preserve-3d;
  transition:transform .18s cubic-bezier(.25,.46,.45,.94),box-shadow .3s ease;
  animation:borderPulse 4s ease-in-out 1s infinite;
}

/* Top glass sheen */
.calc::before{
  content:'';position:absolute;top:0;left:0;right:0;height:48%;
  background:linear-gradient(180deg,rgba(255,255,255,.045) 0%,transparent 100%);
  border-radius:var(--radius) var(--radius) 0 0;pointer-events:none;z-index:0;
}

/* Top light streak */
.calc::after{
  content:'';position:absolute;top:0;left:12%;right:12%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
  border-radius:var(--radius) var(--radius) 0 0;z-index:2;
}

@keyframes borderPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(255,255,255,.045) inset,0 -1px 0 rgba(0,0,0,.6) inset,0 48px 96px rgba(0,0,0,.75),0 0 0 1px rgba(0,0,0,.6),0 0 70px var(--gold-glow)}
  50%{box-shadow:0 0 0 1px rgba(255,255,255,.045) inset,0 -1px 0 rgba(0,0,0,.6) inset,0 48px 96px rgba(0,0,0,.75),0 0 0 1px rgba(0,0,0,.6),0 0 110px rgba(200,168,75,.35)}
}

/* ─── Brand ─── */
.brand{
  position:relative;z-index:1;text-align:center;
  font-weight:200;font-size:9.5px;letter-spacing:.55em;
  color:var(--cream-m);text-transform:uppercase;
  margin-bottom:18px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.brand::before,.brand::after{content:'';display:block;flex:1;max-width:40px;height:.5px}
.brand::before{background:linear-gradient(90deg,transparent,var(--gold-d))}
.brand::after{background:linear-gradient(270deg,transparent,var(--gold-d))}

/* ─── Display ─── */
.disp{
  position:relative;z-index:1;
  background:rgba(5,5,10,.82);
  border:1px solid rgba(185,148,55,.14);
  border-radius:18px;
  padding:14px 18px 18px;
  margin-bottom:20px;
  min-height:115px;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,0,0,.6) inset,0 6px 24px rgba(0,0,0,.5);
  transition:box-shadow .4s ease;
}
.disp.glow{box-shadow:0 0 0 1px rgba(0,0,0,.6) inset,0 6px 24px rgba(0,0,0,.5),0 0 35px rgba(200,168,75,.14)}

/* Scanlines */
.disp::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
}

/* Corner accent dot */
.disp::after{
  content:'';position:absolute;top:12px;left:14px;
  width:6px;height:6px;border-radius:50%;
  background:radial-gradient(circle,var(--gold) 30%,transparent 70%);opacity:.5;
}

.d-expr{
  font-family:var(--uf);font-weight:300;font-size:13px;
  color:var(--cream-m);letter-spacing:.05em;min-height:18px;
  position:relative;z-index:1;
  white-space:nowrap;overflow-x:auto;scrollbar-width:none;
  text-align:right;width:100%;transition:opacity .25s;
}
.d-expr::-webkit-scrollbar{display:none}

.d-val{
  font-family:var(--df);font-weight:300;font-size:54px;
  color:var(--cream);line-height:1.08;letter-spacing:-.02em;
  position:relative;z-index:1;
  white-space:nowrap;overflow-x:auto;scrollbar-width:none;
  text-align:right;width:100%;
  transition:font-size .25s ease,color .4s ease,text-shadow .4s ease;
}
.d-val::-webkit-scrollbar{display:none}

.d-val.pop{animation:numPop .18s cubic-bezier(.4,0,.2,1)}
@keyframes numPop{0%{transform:scale(.96);opacity:.55}100%{transform:scale(1);opacity:1}}

.d-val.pulse{animation:resultFlash .6s ease-out}
@keyframes resultFlash{0%{color:var(--gold-l);text-shadow:0 0 40px var(--gold-glow)}100%{color:var(--cream);text-shadow:none}}

.d-val.err{color:#e07055}

/* ─── Grid ─── */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;position:relative;z-index:1}

/* ─── Button base ─── */
.btn{
  border:none;border-radius:var(--btn-r);
  font-family:var(--uf);font-size:19px;font-weight:300;
  cursor:pointer;position:relative;overflow:hidden;
  height:68px;display:flex;align-items:center;justify-content:center;
  outline:none;-webkit-tap-highlight-color:transparent;user-select:none;
  transition:transform .12s cubic-bezier(.4,0,.2,1),box-shadow .18s,background .15s,color .15s,border-color .2s,filter .15s;
}
.btn:focus-visible{box-shadow:0 0 0 2px var(--gold)}
.btn:active{transform:scale(.88) translateY(2px)!important}

/* Ripple */
.ripple{position:absolute;border-radius:50%;transform:scale(0);animation:rip .55s linear forwards;pointer-events:none}
@keyframes rip{to{transform:scale(4.5);opacity:0}}

/* ─── Number buttons ─── */
.bn{
  background:var(--btn-num);color:var(--cream);
  border:1px solid rgba(255,255,255,.055);
  box-shadow:0 1px 0 rgba(255,255,255,.055) inset,0 -1px 0 rgba(0,0,0,.5) inset,0 5px 14px rgba(0,0,0,.35);
}
.bn:hover{
  background:rgba(28,28,46,.97);transform:translateY(-1.5px);
  box-shadow:0 1px 0 rgba(255,255,255,.07) inset,0 -1px 0 rgba(0,0,0,.5) inset,0 8px 20px rgba(0,0,0,.45),0 0 22px rgba(200,168,75,.09);
}
.bn .ripple{background:rgba(255,255,255,.12)}

/* ─── Special buttons ─── */
.bs{
  background:var(--btn-sp);color:rgba(185,175,230,.82);
  border:1px solid rgba(110,100,170,.22);
  box-shadow:0 1px 0 rgba(255,255,255,.055) inset,0 5px 14px rgba(0,0,0,.3);
  font-size:14px;letter-spacing:.03em;font-weight:500;
}
.bs:hover{
  background:rgba(44,42,72,.95);transform:translateY(-1.5px);
  box-shadow:0 1px 0 rgba(255,255,255,.07) inset,0 8px 20px rgba(0,0,0,.4),0 0 22px rgba(130,110,200,.13);
}
.bs .ripple{background:rgba(160,140,220,.15)}

/* ─── Operator buttons ─── */
.bo{
  background:linear-gradient(145deg,rgba(185,135,30,.24),rgba(130,92,18,.2));
  color:var(--gold-l);
  border:1px solid rgba(200,160,50,.28);
  box-shadow:0 1px 0 rgba(255,215,100,.1) inset,0 -1px 0 rgba(0,0,0,.45) inset,0 5px 14px rgba(0,0,0,.3);
  font-size:22px;font-weight:500;
}
.bo:hover{
  background:linear-gradient(145deg,rgba(210,155,40,.35),rgba(155,112,25,.3));
  color:#f4dc78;transform:translateY(-1.5px);
  border-color:rgba(220,175,65,.45);
  box-shadow:0 1px 0 rgba(255,215,100,.16) inset,0 -1px 0 rgba(0,0,0,.45) inset,0 8px 22px rgba(0,0,0,.4),0 0 28px rgba(200,168,75,.25);
}
.bo.active{
  background:var(--gold)!important;color:var(--bg)!important;
  border-color:transparent!important;
  box-shadow:0 1px 0 rgba(255,215,100,.2) inset,0 4px 24px rgba(200,168,75,.35)!important;
  font-weight:600;
}
.bo .ripple{background:rgba(200,168,75,.2)}

/* ─── Equals button ─── */
.be{
  background:linear-gradient(148deg,#c8a84b 0%,#e8cb5e 45%,#c0922e 100%);
  color:#180e00;font-size:28px;font-weight:700;border:none;
  box-shadow:0 1px 0 rgba(255,240,150,.55) inset,0 -2px 0 rgba(0,0,0,.32) inset,0 8px 22px rgba(170,122,25,.45),0 0 48px rgba(200,168,75,.28);
}
.be:hover{
  filter:brightness(1.1);transform:translateY(-2px);
  box-shadow:0 1px 0 rgba(255,240,150,.55) inset,0 -2px 0 rgba(0,0,0,.32) inset,0 14px 32px rgba(170,122,25,.55),0 0 70px rgba(200,168,75,.42);
}
.be .ripple{background:rgba(6,6,14,.18)}

/* ─── Zero wide ─── */
.bz{grid-column:span 2;justify-content:flex-start;padding-left:26px}

/* ─── Responsive ─── */
@media(max-width:380px){
  .calc{padding:20px 16px;border-radius:24px}
  .btn{height:60px;font-size:17px;border-radius:12px}
  .grid{gap:8px}
  .d-val{font-size:44px}
  .brand{font-size:8.5px}
}
@media(max-height:680px){
  .btn{height:58px}
  .d-val{font-size:44px}
  .calc{padding:18px 18px 20px}
  .disp{min-height:100px;margin-bottom:16px}
}
@media(min-height:820px){
  .btn{height:72px}
  .disp{min-height:125px}
}
@media(min-height:920px){
  .btn{height:78px}
}

/* ─── Reduced motion ─── */
@media(prefers-reduced-motion:reduce){
  .orb,.calc{animation:none!important}
  .btn,.d-val,.d-expr,.disp{transition:none!important}
  .ripple{animation:none!important;display:none}
  #particles{display:none}
  .wrap{animation:none!important}
}
</style>
</head>
<body>

<div class="bg-orbs" aria-hidden="true">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
</div>
<canvas id="particles" aria-hidden="true"></canvas>
<div class="vignette" aria-hidden="true"></div>
<svg class="noise" aria-hidden="true" width="100%" height="100%">
  <filter id="nf"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#nf)"/>
</svg>

<div class="wrap">
  <div class="calc" id="calc" role="application" aria-label="Calculator">
    <div class="brand">Calcvlvs</div>
    <div class="disp" id="disp">
      <div class="d-expr" id="expr" aria-live="polite"></div>
      <div class="d-val" id="val" aria-live="assertive">0</div>
    </div>
    <div class="grid" id="grid">
      <button class="btn bs" data-a="clear" aria-label="Clear">AC</button>
      <button class="btn bs" data-a="negate" aria-label="Toggle sign">+/−</button>
      <button class="btn bs" data-a="pct" aria-label="Percent">%</button>
      <button class="btn bo" data-a="op" data-op="÷" aria-label="Divide">÷</button>
      <button class="btn bn" data-a="d" data-d="7">7</button>
      <button class="btn bn" data-a="d" data-d="8">8</button>
      <button class="btn bn" data-a="d" data-d="9">9</button>
      <button class="btn bo" data-a="op" data-op="×" aria-label="Multiply">×</button>
      <button class="btn bn" data-a="d" data-d="4">4</button>
      <button class="btn bn" data-a="d" data-d="5">5</button>
      <button class="btn bn" data-a="d" data-d="6">6</button>
      <button class="btn bo" data-a="op" data-op="−" aria-label="Subtract">−</button>
      <button class="btn bn" data-a="d" data-d="1">1</button>
      <button class="btn bn" data-a="d" data-d="2">2</button>
      <button class="btn bn" data-a="d" data-d="3">3</button>
      <button class="btn bo" data-a="op" data-op="+" aria-label="Add">+</button>
      <button class="btn bn bz" data-a="d" data-d="0">0</button>
      <button class="btn bn" data-a="dec" aria-label="Decimal point">.</button>
      <button class="btn be" data-a="eq" aria-label="Equals">=</button>
    </div>
  </div>
</div>

<script>
(() => {
  /* ── State ── */
  const S = { cur: '0', prev: null, op: null, wait: false, expr: '', evaluated: false };

  const valEl    = document.getElementById('val');
  const exprEl   = document.getElementById('expr');
  const dispEl   = document.getElementById('disp');
  const clearBtn = document.querySelector('[data-a="clear"]');
  const opBtns   = document.querySelectorAll('.bo');

  /* ── Format with comma separators ── */
  function fmt(raw) {
    if (raw === 'Error') return 'Error';
    if (!raw || raw === '-') return raw || '0';
    let neg = raw.startsWith('-'), s = neg ? raw.slice(1) : raw;
    let dot = s.endsWith('.');
    if (dot) s = s.slice(0, -1);
    let parts = s.split('.'), intP = parts[0] || '0', decP = parts[1];
    let out = '', c = 0;
    for (let i = intP.length - 1; i >= 0; i--) {
      out = intP[i] + out;
      if (++c % 3 === 0 && i > 0) out = ',' + out;
    }
    if (decP !== undefined) out += '.' + decP;
    if (dot) out += '.';
    return (neg ? '-' : '') + out;
  }

  /* ── Clean precision after evaluation ── */
  function clean(raw) {
    if (raw === 'Error') return 'Error';
    let n = parseFloat(raw);
    if (!isFinite(n)) return 'Error';
    n = parseFloat(n.toPrecision(12));
    let s = n.toString();
    if (s.includes('e')) return n.toExponential(6);
    if (s.includes('.') && s.split('.')[1].length > 10)
      s = n.toFixed(10).replace(/0+$/, '').replace(/\.$/, '');
    return s;
  }

  /* ── Arithmetic ── */
  function compute(a, op, b) {
    const x = parseFloat(a), y = parseFloat(b);
    if (isNaN(x) || isNaN(y)) return 'Error';
    switch (op) {
      case '+': return (x + y).toString();
      case '−': return (x - y).toString();
      case '×': return (x * y).toString();
      case '÷': return y === 0 ? 'Error' : (x / y).toString();
      default:  return b;
    }
  }

  /* ── Render to display ── */
  function render() {
    exprEl.textContent = S.expr;
    let display = fmt(S.cur);
    valEl.textContent = display;

    /* Error state */
    valEl.classList.toggle('err', S.cur === 'Error');
    if (S.cur === 'Error') {
      valEl.style.fontSize = '34px';
    } else {
      const len = display.replace(/[,.\-]/g, '').length;
      valEl.style.fontSize =
        len > 14 ? '28px' :
        len > 11 ? '34px' :
        len > 9  ? '40px' :
        len > 7  ? '46px' : '';
    }

    /* Auto-scroll */
    valEl.scrollLeft  = valEl.scrollWidth;
    exprEl.scrollLeft = exprEl.scrollWidth;

    /* C / AC label */
    clearBtn.textContent = (S.cur === '0' && !S.prev && !S.op) ? 'AC' : 'C';
  }

  /* ── Micro-feedback: pop on every input ── */
  function popVal() {
    valEl.classList.remove('pop');
    void valEl.offsetWidth;
    valEl.classList.add('pop');
    setTimeout(() => valEl.classList.remove('pop'), 200);
  }

  function clearOps() { opBtns.forEach(b => b.classList.remove('active')); }

  /* ── Actions ── */
  function inputDigit(d) {
    if (S.cur === 'Error') { S.cur = d; S.expr = ''; }
    else if (S.wait)       { S.cur = d; S.wait = false; }
    else {
      if (S.cur.replace(/[^0-9]/g, '').length >= 15) return;
      S.cur = S.cur === '0' ? d : S.cur + d;
    }
    S.evaluated = false;
    popVal(); render();
  }

  function inputOperator(op) {
    if (S.cur === 'Error') return;
    S.evaluated = false;
    if (S.op && !S.wait) {
      const r = compute(S.prev, S.op, S.cur);
      S.expr = fmt(r) + ' ' + op;
      S.prev = r; S.cur = r;
    } else {
      S.expr = fmt(S.cur) + ' ' + op;
      S.prev = S.cur;
    }
    S.op = op; S.wait = true;
    clearOps();
    opBtns.forEach(b => { if (b.dataset.op === op) b.classList.add('active'); });
    render();
  }

  function inputEquals() {
    if (!S.op) return;
    const val = S.wait ? S.prev : S.cur;
    S.expr = fmt(S.prev) + ' ' + S.op + ' ' + fmt(val) + ' =';
    const r = clean(compute(S.prev, S.op, val));
    S.cur = r; S.prev = null; S.op = null; S.wait = true; S.evaluated = true;
    clearOps();

    /* Display glow pulse */
    dispEl.classList.add('glow');
    setTimeout(() => dispEl.classList.remove('glow'), 1200);

    /* Golden flash on result */
    if (r !== 'Error') {
      valEl.classList.remove('pulse');
      void valEl.offsetWidth;
      valEl.classList.add('pulse');
      setTimeout(() => valEl.classList.remove('pulse'), 650);
    }
    render();
  }

  function inputClear() {
    if (S.cur !== '0' && !S.wait && !S.evaluated) {
      S.cur = '0';
    } else {
      S.cur = '0'; S.prev = null; S.op = null;
      S.wait = false; S.expr = ''; S.evaluated = false;
      clearOps();
    }
    render();
  }

  function inputNegate() {
    if (S.cur === 'Error' || S.cur === '0') return;
    S.cur = S.cur.startsWith('-') ? S.cur.slice(1) : '-' + S.cur;
    popVal(); render();
  }

  function inputPercent() {
    if (S.cur === 'Error') return;
    const n = parseFloat(S.cur);
    if (isNaN(n)) return;
    S.cur = (n / 100).toString();
    popVal(); render();
  }

  function inputDecimal() {
    if (S.cur === 'Error') { S.cur = '0.'; S.expr = ''; }
    else if (S.wait)       { S.cur = '0.'; S.wait = false; }
    else if (!S.cur.includes('.')) S.cur += '.';
    S.evaluated = false;
    popVal(); render();
  }

  /* ── Ripple effect ── */
  function ripple(e, btn) {
    const old = btn.querySelector('.ripple');
    if (old) old.remove();
    const span = document.createElement('span');
    span.classList.add('ripple');
    const r = btn.getBoundingClientRect();
    const sz = Math.max(r.width, r.height) * 2;
    const cx = (e.clientX ?? r.left + r.width / 2) - r.left - sz / 2;
    const cy = (e.clientY ?? r.top + r.height / 2)  - r.top  - sz / 2;
    Object.assign(span.style, { width: sz + 'px', height: sz + 'px', left: cx + 'px', top: cy + 'px' });
    btn.appendChild(span);
    span.addEventListener('animationend', () => span.remove());
  }

  /* ── Click delegation ── */
  document.getElementById('grid').addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    ripple(e, btn);
    const a = btn.dataset.a;
    if (a === 'd')      inputDigit(btn.dataset.d);
    if (a === 'op')     inputOperator(btn.dataset.op);
    if (a === 'eq')     inputEquals();
    if (a === 'clear')  inputClear();
    if (a === 'negate') inputNegate();
    if (a === 'pct')    inputPercent();
    if (a === 'dec')    inputDecimal();
  });

  /* ── Keyboard with visual flash ── */
  function flash(sel) {
    const b = document.querySelector(sel);
    if (!b) return;
    b.style.transform = 'scale(.92)';
    setTimeout(() => b.style.transform = '', 130);
  }

  document.addEventListener('keydown', e => {
    const k = e.key;
    if (k >= '0' && k <= '9')              { inputDigit(k);             flash(`[data-d="${k}"]`); }
    else if (k === '.')                     { inputDecimal();            flash('[data-a="dec"]'); }
    else if (k === '+')                     { inputOperator('+');        flash('[data-op="+"]'); }
    else if (k === '-')                     { inputOperator('−');        flash('[data-op="−"]'); }
    else if (k === '*')                     { inputOperator('×');        flash('[data-op="×"]'); }
    else if (k === '/')                     { e.preventDefault(); inputOperator('÷'); flash('[data-op="÷"]'); }
    else if (k === 'Enter' || k === '=')    { inputEquals();             flash('[data-a="eq"]'); }
    else if (k === 'Escape')                { inputClear();              flash('[data-a="clear"]'); }
    else if (k === '%')                     { inputPercent();            flash('[data-a="pct"]'); }
    else if (k === 'Backspace') {
      if (S.cur.length > 1 && S.cur !== 'Error' && !S.wait) {
        S.cur = S.cur.slice(0, -1);
        if (S.cur === '-') S.cur = '0';
      } else if (!S.wait) S.cur = '0';
      popVal(); render();
    }
  });

  /* ── 3D tilt (desktop only, respects reduced motion) ── */
  const calcEl = document.getElementById('calc');
  const noMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!noMotion && window.matchMedia('(hover: hover)').matches) {
    calcEl.addEventListener('mousemove', e => {
      const r = calcEl.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width  - 0.5;
      const y = (e.clientY - r.top)  / r.height - 0.5;
      calcEl.style.transform = `perspective(900px) rotateY(${x * 5}deg) rotateX(${-y * 5}deg) translateZ(0)`;
    });
    calcEl.addEventListener('mouseleave', () => {
      calcEl.style.transform = 'perspective(900px) rotateY(0) rotateX(0) translateZ(0)';
    });
  }

  /* ── Floating gold particles ── */
  const cvs = document.getElementById('particles');
  const ctx = cvs.getContext('2d');
  let W, H;

  function resize() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  class Dot {
    constructor() { this.init(); }
    init() {
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.r  = Math.random() * 1.4 + 0.4;
      this.vx = (Math.random() - 0.5) * 0.25;
      this.vy = (Math.random() - 0.5) * 0.18 - 0.08;
      this.a  = Math.random() * 0.4 + 0.08;
      this.da = (Math.random() * 0.002 + 0.0008) * (Math.random() > 0.5 ? 1 : -1);
    }
    update() {
      this.x += this.vx; this.y += this.vy; this.a += this.da;
      if (this.a > 0.55 || this.a < 0.02) this.da *= -1;
      if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) this.init();
    }
    draw() {
      const a = Math.max(0, this.a);
      ctx.beginPath();
      ctx.arc(this.x, this.y, Math.max(0.1, this.r), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(210,175,95,${a})`;
      ctx.fill();
      if (this.r > 1) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.1, this.r * 3.5), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210,175,95,${a * 0.08})`;
        ctx.fill();
      }
    }
  }

  const dots = Array.from({ length: 55 }, () => new Dot());

  function loopParticles() {
    if (noMotion) return;
    ctx.clearRect(0, 0, W, H);
    dots.forEach(d => { d.update(); d.draw(); });
    requestAnimationFrame(loopParticles);
  }
  loopParticles();

  /* ── Initial render ── */
  render();
})();
</script>
</body>
</html>
