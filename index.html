<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #060608;
            --card: rgba(255, 255, 255, 0.022);
            --card-border: rgba(255, 255, 255, 0.055);
            --fg: #f2f0e8;
            --muted: rgba(255, 255, 255, 0.32);
            --accent: #c9a24c;
            --accent-light: #e2c46e;
            --accent-glow: rgba(200, 162, 78, 0.18);
            --btn-bg: rgba(255, 255, 255, 0.038);
            --btn-hover: rgba(255, 255, 255, 0.075);
            --btn-active: rgba(255, 255, 255, 0.11);
            --op-bg: rgba(200, 162, 78, 0.09);
            --op-hover: rgba(200, 162, 78, 0.17);
            --op-active: rgba(200, 162, 78, 0.24);
            --radius: 28px;
            --btn-radius: 15px;
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ── Background orbs ── */
        .bg-orbs { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }

        .orb { position: absolute; border-radius: 50%; filter: blur(130px); will-change: transform; }

        .orb-1 {
            width: 550px; height: 550px;
            background: radial-gradient(circle, rgba(190, 155, 65, 0.14), transparent 70%);
            top: -12%; right: -8%;
            animation: orbDrift1 22s ease-in-out infinite;
        }
        .orb-2 {
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(170, 135, 55, 0.09), transparent 70%);
            bottom: -14%; left: -10%;
            animation: orbDrift2 28s ease-in-out infinite;
        }
        .orb-3 {
            width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(210, 175, 85, 0.07), transparent 70%);
            top: 48%; left: 52%;
            animation: orbDrift3 18s ease-in-out infinite;
        }

        @keyframes orbDrift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-50px, 35px) scale(1.08); }
            66% { transform: translate(25px, -25px) scale(0.94); }
        }
        @keyframes orbDrift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(45px, -35px) scale(1.05); }
            66% { transform: translate(-25px, 18px) scale(0.92); }
        }
        @keyframes orbDrift3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.35; }
            50% { transform: translate(-50%, -50%) scale(1.35); opacity: 0.55; }
        }

        /* ── Vignette ── */
        .vignette {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%);
        }

        /* ── Particles canvas ── */
        #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* ── Noise overlay ── */
        .noise { position: fixed; inset: 0; pointer-events: none; z-index: 998; opacity: 0.028; }

        /* ── Main wrapper ── */
        main { position: relative; z-index: 10; padding: 20px; width: 100%; max-width: 400px; }

        /* ── Calculator card ── */
        .calculator {
            position: relative;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 26px;
            backdrop-filter: blur(50px) saturate(1.2);
            -webkit-backdrop-filter: blur(50px) saturate(1.2);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.015) inset,
                0 2px 20px rgba(0,0,0,0.35),
                0 20px 70px rgba(0,0,0,0.5),
                0 0 100px rgba(200,162,78,0.025);
            animation: breathe 7s ease-in-out infinite;
            transform-style: preserve-3d;
            transition: transform 0.18s cubic-bezier(.25,.46,.45,.94), box-shadow 0.3s ease;
        }

        /* Top light streak */
        .calculator::before {
            content: '';
            position: absolute;
            top: 0; left: 12%; right: 12%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
            border-radius: var(--radius) var(--radius) 0 0;
            z-index: 2;
        }

        /* Inner top glow */
        .calculator::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.012), transparent);
            pointer-events: none;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.015) inset, 0 2px 20px rgba(0,0,0,0.35), 0 20px 70px rgba(0,0,0,0.5), 0 0 100px rgba(200,162,78,0.025); }
            50% { box-shadow: 0 0 0 1px rgba(255,255,255,0.015) inset, 0 2px 20px rgba(0,0,0,0.35), 0 20px 70px rgba(0,0,0,0.5), 0 0 150px rgba(200,162,78,0.055); }
        }

        /* ── Display ── */
        .display {
            padding: 12px 6px 28px;
            text-align: right;
            min-height: 128px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            overflow: hidden;
        }

        .display::after {
            content: '';
            position: absolute;
            bottom: 0; left: 5%; right: 5%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
        }

        .expression {
            font-size: 15px;
            font-weight: 400;
            color: var(--muted);
            min-height: 22px;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            transition: opacity 0.3s ease, color 0.3s ease;
            padding-bottom: 2px;
        }
        .expression::-webkit-scrollbar { display: none; }

        .result {
            font-size: 50px;
            font-weight: 300;
            color: var(--fg);
            line-height: 1.1;
            margin-top: 6px;
            transition: font-size 0.25s ease, color 0.4s ease, text-shadow 0.4s ease;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            letter-spacing: -1.5px;
        }
        .result::-webkit-scrollbar { display: none; }

        .result.pulse {
            animation: resultFlash 0.6s ease-out;
        }
        @keyframes resultFlash {
            0% { color: var(--accent-light); text-shadow: 0 0 40px var(--accent-glow); }
            100% { color: var(--fg); text-shadow: none; }
        }

        .result.error-state {
            color: #e85d5d;
            font-size: 36px !important;
        }

        /* ── Buttons grid ── */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 18px;
        }

        .btn {
            position: relative;
            height: 66px;
            border: none;
            border-radius: var(--btn-radius);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            overflow: hidden;
            transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:focus-visible { box-shadow: 0 0 0 2px var(--accent); }
        .btn:active { transform: scale(0.96) !important; }

        /* Numbers */
        .btn-num {
            background: var(--btn-bg);
            color: var(--fg);
            border: 1px solid rgba(255,255,255,0.025);
        }
        .btn-num:hover { background: var(--btn-hover); transform: translateY(-1px); }

        /* Functions */
        .btn-func {
            background: rgba(255,255,255,0.055);
            color: rgba(255,255,255,0.65);
            border: 1px solid rgba(255,255,255,0.035);
            font-weight: 600;
            font-size: 18px;
        }
        .btn-func:hover { background: rgba(255,255,255,0.09); color: var(--fg); transform: translateY(-1px); }

        /* Operators */
        .btn-op {
            background: var(--op-bg);
            color: var(--accent);
            border: 1px solid rgba(200,162,78,0.06);
            font-size: 23px;
            font-weight: 500;
        }
        .btn-op:hover { background: var(--op-hover); transform: translateY(-1px); box-shadow: 0 4px 18px rgba(200,162,78,0.08); }
        .btn-op.selected {
            background: var(--accent) !important;
            color: var(--bg) !important;
            box-shadow: 0 4px 24px rgba(200,162,78,0.28);
            border-color: transparent;
        }

        /* Equals */
        .btn-eq {
            background: linear-gradient(140deg, var(--accent-light) 0%, var(--accent) 50%, #a6832f 100%);
            color: #0a0a0e;
            font-weight: 700;
            font-size: 26px;
            border: none;
            box-shadow: 0 4px 22px rgba(200,162,78,0.2);
        }
        .btn-eq:hover {
            background: linear-gradient(140deg, #ecd07a 0%, var(--accent-light) 50%, var(--accent) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(200,162,78,0.3);
        }

        /* Zero spans 2 columns */
        .btn-zero { grid-column: span 2; }

        /* ── Ripple ── */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleOut 0.55s ease-out forwards;
            pointer-events: none;
        }
        .btn-num .ripple, .btn-func .ripple { background: rgba(255,255,255,0.12); }
        .btn-op .ripple { background: rgba(200,162,78,0.18); }
        .btn-eq .ripple { background: rgba(6,6,14,0.18); }

        @keyframes rippleOut { to { transform: scale(4); opacity: 0; } }

        /* ── Responsive ── */
        @media (max-width: 440px) {
            main { padding: 12px; }
            .calculator { padding: 20px; border-radius: 24px; }
            .btn { height: 60px; font-size: 18px; border-radius: 13px; }
            .result { font-size: 44px; }
            .buttons { gap: 8px; margin-top: 14px; }
        }
        @media (max-width: 360px) {
            .calculator { padding: 16px; }
            .btn { height: 54px; font-size: 16px; border-radius: 11px; }
            .result { font-size: 38px; }
            .display { padding: 8px 4px 22px; min-height: 108px; }
            .expression { font-size: 13px; }
        }
        @media (min-height: 820px) {
            .btn { height: 72px; }
            .display { min-height: 140px; }
        }
        @media (min-height: 920px) {
            .btn { height: 78px; }
        }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            .orb, .calculator { animation: none !important; }
            .btn, .result, .expression { transition: none !important; }
            .ripple { animation: none !important; display: none; }
            #particles { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <canvas id="particles" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>

    <svg class="noise" aria-hidden="true" width="100%" height="100%">
        <filter id="nf"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter>
        <rect width="100%" height="100%" filter="url(#nf)"/>
    </svg>

    <main>
        <div class="calculator" id="calculator" role="application" aria-label="Calculator">
            <div class="display">
                <div class="expression" id="expression" aria-live="polite"></div>
                <div class="result" id="result" aria-live="assertive">0</div>
            </div>
            <div class="buttons" id="buttons">
                <button class="btn btn-func" data-action="clear" aria-label="Clear">AC</button>
                <button class="btn btn-func" data-action="negate" aria-label="Toggle sign">+/−</button>
                <button class="btn btn-func" data-action="percent" aria-label="Percent">%</button>
                <button class="btn btn-op" data-action="operator" data-op="÷" aria-label="Divide">÷</button>

                <button class="btn btn-num" data-action="number" data-num="7">7</button>
                <button class="btn btn-num" data-action="number" data-num="8">8</button>
                <button class="btn btn-num" data-action="number" data-num="9">9</button>
                <button class="btn btn-op" data-action="operator" data-op="×" aria-label="Multiply">×</button>

                <button class="btn btn-num" data-action="number" data-num="4">4</button>
                <button class="btn btn-num" data-action="number" data-num="5">5</button>
                <button class="btn btn-num" data-action="number" data-num="6">6</button>
                <button class="btn btn-op" data-action="operator" data-op="−" aria-label="Subtract">−</button>

                <button class="btn btn-num" data-action="number" data-num="1">1</button>
                <button class="btn btn-num" data-action="number" data-num="2">2</button>
                <button class="btn btn-num" data-action="number" data-num="3">3</button>
                <button class="btn btn-op" data-action="operator" data-op="+" aria-label="Add">+</button>

                <button class="btn btn-num btn-zero" data-action="number" data-num="0">0</button>
                <button class="btn btn-num" data-action="decimal" aria-label="Decimal point">.</button>
                <button class="btn btn-eq" data-action="equals" aria-label="Equals">=</button>
            </div>
        </div>
    </main>

    <script>
    (() => {
        /* ── State ── */
        const state = {
            current: '0',      // raw current input string
            previous: '',      // stored previous operand
            operator: null,    // active operator
            shouldReset: false,// next digit should replace display
            expression: '',    // expression line text
            justEvaluated: false
        };

        const exprEl  = document.getElementById('expression');
        const resEl   = document.getElementById('result');
        const calcEl  = document.getElementById('calculator');
        const clearBtn = document.querySelector('[data-action="clear"]');
        const opBtns  = document.querySelectorAll('.btn-op');

        /* ── Format number for display ── */
        function fmt(raw) {
            if (raw === 'Error') return 'Error';
            if (!raw || raw === '-') return raw || '0';

            let neg = raw.startsWith('-');
            let s = neg ? raw.slice(1) : raw;
            let dot = s.endsWith('.');
            if (dot) s = s.slice(0, -1);

            let parts = s.split('.');
            let intPart = parts[0] || '0';
            let decPart = parts[1];

            // Comma-separate integer
            let out = '', c = 0;
            for (let i = intPart.length - 1; i >= 0; i--) {
                out = intPart[i] + out;
                if (++c % 3 === 0 && i > 0) out = ',' + out;
            }
            if (decPart !== undefined) out += '.' + decPart;
            if (dot) out += '.';
            return (neg ? '-' : '') + out;
        }

        /* ── Clean result after evaluation ── */
        function cleanResult(raw) {
            if (raw === 'Error') return 'Error';
            let n = parseFloat(raw);
            if (!isFinite(n)) return 'Error';
            n = parseFloat(n.toPrecision(12));
            let s = n.toString();
            if (s.includes('e')) return n.toExponential(6);
            // Trim excessive decimals
            if (s.includes('.') && s.split('.')[1].length > 10) {
                s = n.toFixed(10).replace(/0+$/, '').replace(/\.$/, '');
            }
            return s;
        }

        /* ── Compute ── */
        function compute(a, op, b) {
            const x = parseFloat(a), y = parseFloat(b);
            if (isNaN(x) || isNaN(y)) return 'Error';
            switch (op) {
                case '+':  return (x + y).toString();
                case '−':  return (x - y).toString();
                case '×':  return (x * y).toString();
                case '÷':  return y === 0 ? 'Error' : (x / y).toString();
                default:   return b;
            }
        }

        /* ── Update display ── */
        function render() {
            exprEl.textContent = state.expression;

            let displayStr = fmt(state.current);
            resEl.textContent = displayStr;
            resEl.classList.toggle('error-state', state.current === 'Error');

            // Auto-size
            const len = displayStr.replace(/[,.\-]/g, '').length;
            resEl.style.fontSize =
                len > 14 ? '26px' :
                len > 11 ? '32px' :
                len > 9  ? '38px' :
                len > 7  ? '44px' : '';

            // Scroll to end
            resEl.scrollLeft = resEl.scrollWidth;
            exprEl.scrollLeft = exprEl.scrollWidth;

            // C / AC label
            const isClean = state.current === '0' && !state.previous && !state.operator;
            clearBtn.textContent = isClean ? 'AC' : 'C';
        }

        /* ── Actions ── */
        function inputNumber(d) {
            if (state.current === 'Error') { state.current = d; state.expression = ''; }
            else if (state.shouldReset) { state.current = d; state.shouldReset = false; }
            else {
                if (state.current.replace(/[^0-9]/g, '').length >= 15) return;
                state.current = state.current === '0' ? d : state.current + d;
            }
            state.justEvaluated = false;
            render();
        }

        function inputOperator(op) {
            if (state.current === 'Error') return;
            state.justEvaluated = false;

            if (state.operator && !state.shouldReset) {
                const r = compute(state.previous, state.operator, state.current);
                state.expression = r + ' ' + op;
                state.previous = r;
                state.current = r;
            } else {
                state.expression = state.current + ' ' + op;
                state.previous = state.current;
            }
            state.operator = op;
            state.shouldReset = true;

            opBtns.forEach(b => b.classList.toggle('selected', b.dataset.op === op));
            render();
        }

        function inputEquals() {
            if (!state.operator) return;
            const val = state.shouldReset ? state.previous : state.current;
            state.expression = state.previous + ' ' + state.operator + ' ' + val + ' =';

            const r = cleanResult(compute(state.previous, state.operator, val));
            state.current = r;
            state.previous = '';
            state.operator = null;
            state.shouldReset = true;
            state.justEvaluated = true;

            opBtns.forEach(b => b.classList.remove('selected'));

            // Golden pulse
            if (r !== 'Error') {
                resEl.classList.remove('pulse');
                void resEl.offsetWidth;
                resEl.classList.add('pulse');
            }
            render();
        }

        function inputClear() {
            if (state.current !== '0' && !state.shouldReset && !state.justEvaluated) {
                // "C" — clear current entry only
                state.current = '0';
            } else {
                // "AC" — full reset
                state.current = '0';
                state.previous = '';
                state.operator = null;
                state.shouldReset = false;
                state.expression = '';
                state.justEvaluated = false;
                opBtns.forEach(b => b.classList.remove('selected'));
            }
            render();
        }

        function inputNegate() {
            if (state.current === 'Error' || state.current === '0') return;
            state.current = state.current.startsWith('-') ? state.current.slice(1) : '-' + state.current;
            render();
        }

        function inputPercent() {
            if (state.current === 'Error') return;
            const n = parseFloat(state.current);
            if (isNaN(n)) return;
            state.current = (n / 100).toString();
            render();
        }

        function inputDecimal() {
            if (state.current === 'Error') { state.current = '0.'; state.expression = ''; }
            else if (state.shouldReset) { state.current = '0.'; state.shouldReset = false; }
            else if (!state.current.includes('.')) { state.current += '.'; }
            state.justEvaluated = false;
            render();
        }

        /* ── Ripple ── */
        function ripple(e, btn) {
            const old = btn.querySelector('.ripple');
            if (old) old.remove();
            const span = document.createElement('span');
            span.classList.add('ripple');
            const r = btn.getBoundingClientRect();
            const sz = Math.max(r.width, r.height) * 2;
            const cx = (e.clientX ?? r.left + r.width / 2) - r.left - sz / 2;
            const cy = (e.clientY ?? r.top + r.height / 2) - r.top - sz / 2;
            Object.assign(span.style, { width: sz + 'px', height: sz + 'px', left: cx + 'px', top: cy + 'px' });
            btn.appendChild(span);
            span.addEventListener('animationend', () => span.remove());
        }

        /* ── Button click delegation ── */
        document.getElementById('buttons').addEventListener('click', e => {
            const btn = e.target.closest('.btn');
            if (!btn) return;
            ripple(e, btn);
            const a = btn.dataset.action;
            if (a === 'number')   inputNumber(btn.dataset.num);
            if (a === 'operator') inputOperator(btn.dataset.op);
            if (a === 'equals')   inputEquals();
            if (a === 'clear')    inputClear();
            if (a === 'negate')   inputNegate();
            if (a === 'percent')  inputPercent();
            if (a === 'decimal')  inputDecimal();
        });

        /* ── Keyboard ── */
        function flashBtn(sel) {
            const b = document.querySelector(sel);
            if (!b) return;
            b.style.transform = 'scale(0.94)';
            setTimeout(() => b.style.transform = '', 140);
        }

        document.addEventListener('keydown', e => {
            const k = e.key;
            if (k >= '0' && k <= '9') { inputNumber(k); flashBtn(`[data-num="${k}"]`); }
            else if (k === '.') { inputDecimal(); flashBtn('[data-action="decimal"]'); }
            else if (k === '+') { inputOperator('+'); flashBtn('[data-op="+"]'); }
            else if (k === '-') { inputOperator('−'); flashBtn('[data-op="−"]'); }
            else if (k === '*') { inputOperator('×'); flashBtn('[data-op="×"]'); }
            else if (k === '/') { e.preventDefault(); inputOperator('÷'); flashBtn('[data-op="÷"]'); }
            else if (k === 'Enter' || k === '=') { inputEquals(); flashBtn('[data-action="equals"]'); }
            else if (k === 'Escape') { inputClear(); flashBtn('[data-action="clear"]'); }
            else if (k === '%') { inputPercent(); flashBtn('[data-action="percent"]'); }
            else if (k === 'Backspace') {
                if (state.current.length > 1 && state.current !== 'Error' && !state.shouldReset) {
                    state.current = state.current.slice(0, -1);
                    if (state.current === '-') state.current = '0';
                } else if (!state.shouldReset) {
                    state.current = '0';
                }
                render();
            }
        });

        /* ── 3D tilt ── */
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!reducedMotion && window.matchMedia('(hover: hover)').matches) {
            calcEl.addEventListener('mousemove', e => {
                const r = calcEl.getBoundingClientRect();
                const x = (e.clientX - r.left) / r.width - 0.5;
                const y = (e.clientY - r.top) / r.height - 0.5;
                calcEl.style.transform =
                    `perspective(900px) rotateY(${x * 5}deg) rotateX(${-y * 5}deg) translateZ(0)`;
            });
            calcEl.addEventListener('mouseleave', () => {
                calcEl.style.transform = 'perspective(900px) rotateY(0) rotateX(0) translateZ(0)';
            });
        }

        /* ── Particle system ── */
        const cvs = document.getElementById('particles');
        const ctx = cvs.getContext('2d');
        let W, H;

        function resize() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        class Dot {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.r = Math.random() * 1.4 + 0.4;
                this.vx = (Math.random() - 0.5) * 0.25;
                this.vy = (Math.random() - 0.5) * 0.18 - 0.08;
                this.alpha = Math.random() * 0.4 + 0.08;
                this.da = (Math.random() * 0.002 + 0.0008) * (Math.random() > 0.5 ? 1 : -1);
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha += this.da;
                if (this.alpha > 0.55 || this.alpha < 0.02) this.da *= -1;
                if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) this.init();
            }
            draw() {
                const a = Math.max(0, this.alpha);
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.1, this.r), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(210,175,95,${a})`;
                ctx.fill();
                if (this.r > 1) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, Math.max(0.1, this.r * 3.5), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(210,175,95,${a * 0.08})`;
                    ctx.fill();
                }
            }
        }

        const dots = Array.from({ length: 55 }, () => new Dot());

        function loopParticles() {
            if (reducedMotion) return;
            ctx.clearRect(0, 0, W, H);
            dots.forEach(d => { d.update(); d.draw(); });
            requestAnimationFrame(loopParticles);
        }
        loopParticles();

        /* ── Initial render ── */
        render();
    })();
    </script>
</body>
</html>
